<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/cadastro-insumos.css">
    <title>Cadastro de Insumos</title>
</head>
<body>
        <header class="cabecalho-sistema">
        <section class="perfil-usuarios">
            <p id="user">Usuário</p>
        </section>
        <section id="logout">
            <button type="button" onclick="window.location.href='gerenciador.html'">
               <i class="bx bx-exit"></i> Voltar
            </button>
        </section>
    </header>

    <h1>Cadastramento de Insumos</h1>

    <div class="form-container">
        <div class="layout-form">
            <form id="formInsumo">
            <div class="container-cad-fornecedor">
                <label for="id_fornecedor">Fornecedor</label>
                <select id="id_fornecedor" required>
                    <option value="">Selecione um fornecedor...</option>
                </select>
            </div>
                <hr> 
                
                <div class="container-cad-insumo">
                    <label for="lote">Lote</label>
                    <input type="text" id="lote" placeholder="Ex. : Lt2026" required>
                </div>
                <div class="container-cad-insumo">
                    <label for="data_validade">Data de validade</label>
                    <input type="date" id="data_validade" required>
                </div>
                <div class="container-cad-insumo">
                    <label for="unidade_medida">Unidade de Medida</label>
                    <input type="text" id="unidade_medida" placeholder="Ex. : L / Kg / Unidades" required>
                </div>
                <div class="container-cad-insumo">
                    <label for="nome_insumo">Nome do Item (Insumo)</label>
                    <input type="text" id="nome_insumo" placeholder="Ex. : açúcar / embalagens." required>
                </div>
                <div class="container-cad-insumo">
                    <label for="id_categoria">Categoria</label>
                    <select id="id_categoria" required>
                        <option value="1">Concentrados e Essências</option>
                        <option value="2">Açúcares e Adoçantes</option>
                        <option value="3">Embalagens (Garrafa, Lata, Rótulo)</option>
                    </select>
                </div>
                <div class="container-cad-insumo">
                    <label for="quantidade_estoque">Quantidade Atual</label>
                    <input type="number" step="0.01" id="quantidade_estoque" placeholder="Ex. : 1500" required>
                </div>
                <div class="container-cad-insumo">
                    <label for="estoque_minimo">Estoque Minimo</label>
                    <input type="number" step="0.01" id="estoque_minimo" placeholder="Ex. : 500" required>
                </div>
                <div class="container-cad-insumo">
                    <label for="volume">Volume</label>
                    <input type="text" id="volume" placeholder="Ex. : 20L / 50Kg / N/A">
                </div>

                <div class="btn-cad">
                    <button type="submit">Cadastrar</button>           
                </div>
            </form>
        </div>
    </div>

    <script src="javaScript/cadastro.js"></script>
</body>
</html>
