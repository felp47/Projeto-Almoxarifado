<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimentação de Insumos</title>
    <link rel="stylesheet" href="css/movimentacoes.css">
</head>
<body>
    <header class="cabecalho-sistema">
        <section class="perfil-usuarios">
            <p id="user">Usuário</p>
        </section>
        <section id="logout">
            <button type="button" onclick="window.location.href='main.html'">
                Menu Principal
            </button>
        </section>
    </header>
    <main class="conteudo-principal">
        <section class="introducao-modulo">
            <h1>Movimentação de Insumos</h1>
            <p>Registre entradas e saídas e monitore níveis críticos de estoque em tempo real</p>
        </section>
        <section class="secao-formulario">
            <div class="layout-form">
                <form id="formMovimentacao">
                    <h2>Registrar Nova Movimentação</h2>
                    <div class="container-input-mov">
                        <label for="insumoSelect">Insumo Disponível</label>
                        <select id="insumoSelect" required>
                            <option value="">Carregando insumos ordenados...</option>
                        </select>
                    </div>
                    <div class="container-input-mov">
                        <label for="tipo_movimentacao">Tipo de Operação</label>
                        <select id="tipo_movimentacao" required>
                            <option value="REPOSIÇÃO">Reposição (Entrada de Almoxarifado)</option>
                            <option value="RETIRADA">Retirada (Saída para Produção)</option>
                        </select>
                    </div>
                    <div class="container-input-mov">
                        <label for="quantidade">
                            Quantidade (<span id="unidadeDisplay">Unidade</span>)
                        </label>
                        <input type="number" step="0.01" min="0.01" id="quantidade" placeholder="Ex: 150.00" required>
                    </div>
                    <div class="container-input-mov">
                        <label for="setor_solicitante">Setor Destino/Origem (ID)</label>
                        <select id="setor_solicitante" required>
                            <option value="">Carregando setores</option>
                        </select>
                    </div>
                    <div class="btn-submeter-mov">
                        <button type="submit">Gravar Movimentação</button>
                    </div>
                </form>
            </div>
        </section>
        <section class="secao-historico">
            <h2>Histórico de Auditoria (Registro Imutável)</h2>
            <div class="container-table">
                <table>
                    <thead>
                        <tr>
                            <th>ID Mov.</th>
                            <th>Data / Hora</th>
                            <th>Insumo Afetado</th>
                            <th>Operação</th>
                            <th>Qtd. Movimentada</th>
                            <th>Setor Solicitante</th>
                            <th>Responsável</th>
                        </tr>
                    </thead>
                    <tbody id="corpoHistorico">
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <script src="javaScript/movimentacoes.js"></script>
</body>
</html>
